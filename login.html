<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FitPulse Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-dark h-screen flex flex-col justify-center items-center px-6 text-text-main">
    <a href="index.html" class="absolute top-10 left-10 flex items-center gap-2 text-text-muted hover:text-primary transition-colors uppercase font-bold text-xs tracking-widest">
        <i data-lucide="chevron-left" class="w-4 h-4"></i> Back Home
    </a>

    <div class="w-full max-w-md bg-surface border border-edge p-12 rounded-3xl clean-shadow">
        <div class="flex flex-col items-center mb-10">
            <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mb-6">
                <i data-lucide="activity" class="text-white w-10 h-10"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tighter uppercase mb-2">Welcome Back</h1>
            <p class="text-text-muted text-sm font-semibold uppercase tracking-widest">Access your performance labs</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-xs font-black uppercase tracking-widest text-text-muted mb-3">Target Email</label>
                <input type="email" placeholder="athlete@fitpulse.pro" required
                       class="w-full bg-dark border border-edge p-4 rounded-xl text-text-main focus:border-primary focus:outline-none transition-all placeholder:text-slate-300">
            </div>
            <div>
                <label class="block text-xs font-black uppercase tracking-widest text-text-muted mb-3">Security Key</label>
                <input type="password" placeholder="••••••••" required
                       class="w-full bg-dark border border-edge p-4 rounded-xl text-text-main focus:border-primary focus:outline-none transition-all placeholder:text-slate-300">
            </div>
            <button type="submit" class="w-full bg-primary text-white py-5 rounded-xl font-black text-lg uppercase tracking-tight clean-btn mt-4">
                Initialize Session
            </button>
        </form>

        <div class="mt-8 text-center text-sm">
            <span class="text-text-muted font-bold uppercase tracking-widest">No clearance?</span>
            <a href="signup.html" class="text-primary font-black uppercase tracking-widest ml-2 hover:underline">Apply for Entry</a>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
